services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-visao-2026
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - app-network
